# Alembic configuration for panopticon's task store (ADR 0001 §3 — migrations from day one).
#
# The database URL is NOT set here; migrations/env.py resolves it from $PANOPTICON_DB (the same
# env var + default the task service uses), so `alembic` and `python -m panopticon.taskservice`
# always agree on which database they touch. Override per-invocation with `alembic -x db=<url>`.
[alembic]
script_location = migrations
# Keep generated revision filenames sortable + human-readable: <date>_<slug>.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = src
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
